<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>RED</title>
    <script
      src="https://kit.fontawesome.com/7529f5907c.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700|Oswald&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/3.0.7/fullpage.css"
    />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="#inciio" class="marca">RED</a>
      <ul id="menu" class="menu">
        <li data-menuanchor="inicio" class="active">
          <a href="#inicio">Inicio</a>
        </li>
        <li data-menuanchor="proyectos">
          <a href="#proyectos">Proyectos</a>
        </li>
        <li data-menuanchor="contacto">
          <a href="#contacto">Contacto</a>
        </li>
      </ul>
    </nav>
    <main id="fullpage">
      <header class="section header">
        <div class="contenedor-titulo">
          <h1 class="titulo">
            <span class="texto-naranja">titulo</span>
            <span class="texto-blanco">Primera Pagina</span>
          </h1>
          <p class="texto-blanco">parrafo primero</p>
        </div>
        <div class="contenedor-icono">
          <p>
            <a href="#proyectos" class="texto-blanco">
              <i class="fa-sharp fa-solid fa-chevron-down"></i>
            </a>
          </p>
        </div>
      </header>

      <section class="section proyectos">
        <article class="slide">

          <div class="informacion-proyecto">
            <p class="modelo">
              <span class="texto-naranja">Healthy</span>
              <span class="texto-negro">Food</span>
            </p>
            <p class="descripcion texto-negro">Lorem, ipsum dolor.</p>
          </div>
        </article>
        <article class="slide">

          <div class="informacion-proyecto">
            <p class="modelo">
              <span class="texto-negro">Dogg</span>
            </p>
            <p class="descripcion texto-negro">Lorem, ipsum dolor.</p>
          </div>
        </article>
        <article class="slide">

          <div class="informacion-proyecto">
            <p class="modelo">
              <span class="texto-negro">verbena</span>
            </p>
            <p class="descripcion texto-negro">Lorem, ipsum dolor.</p>
          </div>

        </article>
      </section>

      <footer class="section">
        <h1>Contact</h1>
      </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/3.0.7/fullpage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
